name: cicd

on:
  push:
    paths:
      - "src/**"
      - ".github/workflows/**"
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: log into docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-app:${{ env.SHORT_SHA }}
    outputs:
      commit_id: ${{ env.SHORT_SHA }}
  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv

      - name: Create virtual environment and install dependencies
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .venv
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install yq

      - name: Modify values file
        shell: bash
        run: |
          set -euo pipefail
          source .venv/bin/activate
          echo ${{ needs.ci.outputs.commit_id }}
          yq -yi '.image.tag = "${{ needs.ci.outputs.commit_id }}"' charts/python-app/values.yaml
          
      - name: Commit changes
        uses: Endbug/add-and-commit@v9
        with:
          message: 'Updates values.yaml with commit id ${{ needs.ci.outputs.commit_id }}'
    
      - name: Install ArgoCd
        shell: bash
        run: |
          # install argocd
          set -euo pipefail
          curl -ksSL -o argocd https://argocd-server.argocd/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv ./argocd /usr/local/bin/argocd
          
      - name: Argocd app sync
        env:
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username "$ARGOCD_USERNAME" \
            --password "$ARGOCD_PASSWORD"
          argocd app sync python-app
